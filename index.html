<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoF">
<meta name="theme-color" content="#060608">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Circle of Fifths</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:#060608; --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.08);
  --text:#e8e4f0; --muted:#4a4a68; --dim:#2a2a40;
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; overflow:hidden; overscroll-behavior:none; }
#particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
.app { position:relative; z-index:1; display:flex; flex-direction:column; width:100%; height:100%; padding-top:max(14px,var(--sat)); padding-bottom:max(14px,var(--sab)); padding-left:12px; padding-right:12px; gap:8px; overflow:hidden; }
.hdr { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.hdr h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.45rem; letter-spacing:.12em; background:linear-gradient(90deg,#8ab4ff,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.status-pill { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:5px 10px; font-size:.52rem; letter-spacing:.08em; color:var(--muted); }
.dot { width:6px; height:6px; border-radius:50%; background:var(--dim); flex-shrink:0; }
.dot.on  { background:#4ade80; box-shadow:0 0 6px rgba(74,222,128,.8); animation:blink 1.2s infinite; }
.dot.go  { background:#60d4f0; box-shadow:0 0 7px rgba(96,212,240,.8); animation:blink .65s infinite; }
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.circle-wrap { flex-shrink:0; display:flex; justify-content:center; align-items:center; }
#cof { width:min(calc(100vw - 24px),48vh); height:min(calc(100vw - 24px),48vh); }
.bottom { flex:1; display:flex; flex-direction:column; gap:7px; overflow:hidden; min-height:0; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:7px; flex-shrink:0; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 12px; backdrop-filter:blur(10px); }
.clabel { font-size:.5rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
.big-note { font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:400; line-height:1; min-height:42px; display:flex; align-items:center; transition:color .25s; }
.note-sub { font-size:.5rem; color:var(--muted); margin-top:2px; }
.cents { font-size:.5rem; margin-top:2px; }
.intv-name { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; line-height:1.1; transition:color .3s; }
.intv-sub { font-size:.52rem; color:var(--muted); margin-top:4px; }
.badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.48rem; letter-spacing:.1em; text-transform:uppercase; border:1px solid currentColor; margin-top:5px; }
.meter { height:2px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:7px; }
.mfill { height:100%; width:0%; border-radius:2px; transition:width .08s; background:linear-gradient(90deg,#4fc3d4,#a78bfa); }
.hist { display:flex; flex-wrap:wrap; gap:3px; }
.hchip { padding:2px 6px; border-radius:4px; font-size:.5rem; background:var(--surface2); border:1px solid var(--border); color:var(--muted); animation:pop .15s ease; }
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:7px; flex-shrink:0; }
.btn { padding:11px 8px; border-radius:10px; border:none; font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.06em; cursor:pointer; transition:all .15s; text-transform:uppercase; }
.btn:active { transform:scale(.95); }
.btn-start { background:linear-gradient(135deg,#3b4fd4,#7c3aed); color:#fff; font-weight:700; box-shadow:0 2px 16px rgba(124,58,237,.3); }
.btn-tonic { background:rgba(255,255,255,.05); color:var(--text); border:1px solid var(--border); }
.btn-tonic:disabled { opacity:.3; }
.theme-row { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 14px; flex-shrink:0; cursor:pointer; user-select:none; }
.theme-row span { font-size:.55rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; flex:1; }
.theme-row .price { font-size:.5rem; color:rgba(255,255,255,.15); }
.toggle-track { width:36px; height:20px; border-radius:10px; background:var(--dim); position:relative; transition:background .25s; flex-shrink:0; }
.toggle-track.on { background:linear-gradient(90deg,#7c3aed,#db2777); }
.toggle-knob { position:absolute; top:3px; left:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.4); }
.toggle-track.on .toggle-knob { transform:translateX(16px); }

/* SVG */
.seg { fill:transparent; stroke:rgba(255,255,255,0.06); stroke-width:.5; transition:fill .25s,stroke .25s,filter .25s; }
.nt { font-family:'Cormorant Garamond',serif; font-size:13px; text-anchor:middle; dominant-baseline:central; fill:rgba(255,255,255,0.25); user-select:none; transition:fill .2s; }
.at { font-family:'Space Mono',monospace; font-size:7px; text-anchor:middle; dominant-baseline:central; fill:rgba(255,255,255,0.1); pointer-events:none; }
.ct { font-family:'Space Mono',monospace; font-size:6px; text-anchor:middle; dominant-baseline:central; fill:rgba(255,255,255,0.12); pointer-events:none; transition:fill .3s; }
.spoke { stroke:rgba(255,255,255,0.05); stroke-width:.5; }
.conn { stroke:rgba(255,255,255,0.2); stroke-width:1; stroke-dasharray:4 3; opacity:0; pointer-events:none; transition:opacity .3s; }
.conn.show { opacity:1; }
.gring { fill:none; stroke-width:2; opacity:0; pointer-events:none; }
.gring.show { opacity:.55; animation:grp 1s infinite; }
@keyframes grp{0%,100%{stroke-opacity:.55}50%{stroke-opacity:.12}}
.clbl  { font-family:'Cormorant Garamond',serif; font-size:11px; text-anchor:middle; dominant-baseline:central; fill:rgba(255,255,255,.25); pointer-events:none; transition:fill .3s; }
.clbl2 { font-family:'Space Mono',monospace; font-size:6.5px; text-anchor:middle; dominant-baseline:central; fill:rgba(255,255,255,.15); pointer-events:none; }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="app">
  <div class="hdr">
    <h1>Circle of Fifths</h1>
    <div class="status-pill"><div class="dot" id="sdot"></div><span id="stext">tap mic</span></div>
  </div>
  <div class="circle-wrap"><svg id="cof" viewBox="0 0 320 320"></svg></div>
  <div class="bottom">
    <div class="row2">
      <div class="card">
        <div class="clabel">Tonic</div>
        <div class="big-note" id="tnote" style="color:rgba(255,255,255,.2)">—</div>
        <div class="note-sub" id="tfreq"></div>
      </div>
      <div class="card">
        <div class="clabel">Detected</div>
        <div class="big-note" id="dnote" style="color:rgba(255,255,255,.2)">—</div>
        <div class="note-sub" id="dfreq"></div>
        <div class="cents" id="dcents"></div>
      </div>
    </div>
    <div class="row2">
      <div class="card">
        <div class="clabel">Interval</div>
        <div class="intv-name" id="iname" style="color:rgba(255,255,255,.15)">—</div>
        <div class="intv-sub" id="isub"></div>
        <div id="ibadge"></div>
        <div class="meter"><div class="mfill" id="mfill"></div></div>
      </div>
      <div class="card">
        <div class="clabel">History</div>
        <div class="hist" id="hist"></div>
      </div>
    </div>
    <div class="theme-row" id="theme-row">
      <span>✦ Chromatic Glow</span>
      <span class="price">FREE</span>
      <div class="toggle-track" id="ttk"><div class="toggle-knob"></div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="bmicf">🎙 Start</button>
      <button class="btn btn-tonic" id="btonic" disabled>Set Tonic</button>
    </div>
  </div>
</div>

<script>
// ── Color system ─────────────────────────────────────────────────
// Hues match the reference image: chromatic rainbow by semitone
const HUE=[240,210,170,140,95,55,30,0,330,300,270,255];
const ILBL=['1','b2','2','b3','3','4','#4','5','b6','6','b7','7'];
const h=(hue,s=80,l=60)=>`hsl(${hue},${s}%,${l}%)`;
const ha=(hue,s=80,l=60,a=1)=>`hsla(${hue},${s}%,${l}%,${a})`;

// ── Music data ───────────────────────────────────────────────────
const CIRCLE=[
  {name:'C'},{name:'G'},{name:'D'},{name:'A'},{name:'E'},{name:'B'},
  {name:'F♯',alt:'G♭'},{name:'D♭',alt:'C♯'},{name:'A♭',alt:'G♯'},
  {name:'E♭',alt:'D♯'},{name:'B♭',alt:'A♯'},{name:'F'},
];
const CHROMA=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const N2C={C:0,G:7,D:2,A:9,E:4,B:11,'F♯':6,'D♭':1,'A♭':8,'E♭':3,'B♭':10,F:5};
const INTVS=[
  {en:'Unison',short:'P1',s:0,q:'perfect'},{en:'m2',short:'m2',s:1,q:'minor'},
  {en:'M2',short:'M2',s:2,q:'major'},{en:'m3',short:'m3',s:3,q:'minor'},
  {en:'M3',short:'M3',s:4,q:'major'},{en:'P4',short:'P4',s:5,q:'perfect'},
  {en:'♭5/TT',short:'TT',s:6,q:'tritone'},{en:'P5',short:'P5',s:7,q:'perfect'},
  {en:'m6',short:'m6',s:8,q:'minor'},{en:'M6',short:'M6',s:9,q:'major'},
  {en:'m7',short:'m7',s:10,q:'minor'},{en:'M7',short:'M7',s:11,q:'major'},
];
const DIAT_ST=[0,2,4,5,7,9,11],DIAT_R=['I','ii','iii','IV','V','vi','vii°'];
function diatMap(tc){const m={};DIAT_ST.forEach((s,i)=>m[(tc+s)%12]=DIAT_R[i]);return m;}

// ── SVG build ────────────────────────────────────────────────────
const svg=document.getElementById('cof');
const CX=160,CY=160,RO=154,RI=90,RC=42,N=12;
const SL=(2*Math.PI)/N,OFF=-Math.PI/2-SL/2;
const ns=t=>document.createElementNS('http://www.w3.org/2000/svg',t);
const sa=(el,a)=>{for(const[k,v] of Object.entries(a))el.setAttribute(k,v);return el;};
const ap=(el,p)=>{(p||svg).appendChild(el);return el;};
const pXY=(a,r)=>[CX+r*Math.cos(a),CY+r*Math.sin(a)];
function arcPath(oR,iR,a1,a2){
  const[x1,y1]=pXY(a1,oR),[x2,y2]=pXY(a2,oR);
  const[x3,y3]=pXY(a2,iR),[x4,y4]=pXY(a1,iR);
  return`M${x1} ${y1}A${oR} ${oR} 0 0 1 ${x2} ${y2}L${x3} ${y3}A${iR} ${iR} 0 0 0 ${x4} ${y4}Z`;
}
ap(sa(ns('circle'),{cx:CX,cy:CY,r:RO,fill:'#0d0d18',stroke:'rgba(255,255,255,.07)','stroke-width':'1'}));
ap(sa(ns('circle'),{cx:CX,cy:CY,r:RI,fill:'#080810',stroke:'rgba(255,255,255,.05)','stroke-width':'1'}));
ap(sa(ns('circle'),{cx:CX,cy:CY,r:RC,fill:'#060608',stroke:'rgba(255,255,255,.05)','stroke-width':'1'}));
const gTonic=ap(sa(ns('circle'),{cx:CX,cy:CY,r:(RO+RI)/2,class:'gring',fill:'none'}));
const conn=ap(sa(ns('line'),{class:'conn',x1:CX,y1:CY,x2:CX,y2:CY}));
const segEl={},txtEl={},innEl={},segCtr={};
for(let i=0;i<N;i++){
  const nd=CIRCLE[i],a1=OFF+i*SL,a2=a1+SL,mid=a1+SL/2;
  const[spx,spy]=pXY(a1,RO),[six,siy]=pXY(a1,RI);
  ap(sa(ns('line'),{x1:spx,y1:spy,x2:six,y2:siy,class:'spoke'}));
  const seg=ap(sa(ns('path'),{d:arcPath(RO,RI,a1,a2),class:'seg','data-idx':i}));
  segEl[i]=seg;
  const[tx,ty]=pXY(mid,(RO+RI)/2);
  const t=ap(sa(ns('text'),{x:tx,y:ty,class:'nt','data-idx':i}));
  t.textContent=nd.name; txtEl[i]=t;
  if(nd.alt){const[ax,ay]=pXY(mid,(RO+RI)/2-15);const a=ap(sa(ns('text'),{x:ax,y:ay,class:'at'}));a.textContent=nd.alt;}
  const[ix,iy]=pXY(mid,(RI+RC)/2);
  const it=ap(sa(ns('text'),{x:ix,y:iy,class:'ct'}));
  it.textContent=''; innEl[i]=it;
  segCtr[i]={x:tx,y:ty,angle:mid};
}
const cLbl=ap(sa(ns('text'),{x:CX,y:CY-7,class:'clbl'}));
const cLbl2=ap(sa(ns('text'),{x:CX,y:CY+8,class:'clbl2'}));

// ── Particles ────────────────────────────────────────────────────
const canvas=document.getElementById('particles');
const c2=canvas.getContext('2d');
let parts=[];
const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};
resize(); window.addEventListener('resize',resize);

function svgPt(sx,sy){
  const r=svg.getBoundingClientRect();
  return{x:r.left+sx*(r.width/320),y:r.top+sy*(r.height/320)};
}

class P{
  constructor(x,y,angle,hue){
    this.x=x; this.y=y;
    const sp=0.5+Math.random()*(Math.random()<.5?-1:1)*0.8;
    const speed=1.8+Math.random()*4;
    this.vx=Math.cos(angle+sp)*speed;
    this.vy=Math.sin(angle+sp)*speed;
    this.hue=hue; this.life=1;
    this.decay=0.016+Math.random()*0.018;
    this.sz=1.2+Math.random()*2.8;
  }
  step(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.05; this.vx*=0.97;
    this.life-=this.decay; this.sz*=0.97;
  }
  draw(){
    c2.save(); c2.globalAlpha=Math.max(0,this.life*.85);
    const g=c2.createRadialGradient(this.x,this.y,0,this.x,this.y,this.sz*2.5);
    g.addColorStop(0,`hsl(${this.hue},90%,82%)`);
    g.addColorStop(1,`hsla(${this.hue},80%,60%,0)`);
    c2.fillStyle=g; c2.beginPath();
    c2.arc(this.x,this.y,this.sz*2.5,0,Math.PI*2); c2.fill(); c2.restore();
  }
}

let glowOn=false;
function burst(idx,hue,count=22){
  if(!glowOn) return;
  const sc=segCtr[idx]; if(!sc) return;
  const pt=svgPt(sc.x,sc.y);
  for(let i=0;i<count;i++) parts.push(new P(pt.x,pt.y,sc.angle,hue));
}

(function frame(){
  c2.clearRect(0,0,canvas.width,canvas.height);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{p.step();p.draw();});
  requestAnimationFrame(frame);
})();

// ── Visuals ───────────────────────────────────────────────────────
let colorOn=false;

function refreshAll(dC,tC){
  for(let i=0;i<N;i++){
    const c=N2C[CIRCLE[i].name];
    const isTonic=tC!==-1&&c===tC;
    const isDet=dC!==-1&&c===dC;
    const semi=tC!==-1?(c-tC+12)%12:i;
    const hue=HUE[semi];
    if(colorOn){
      const base=ha(hue,70,40,.15),active=ha(hue,85,55,.5);
      const bStroke=ha(hue,60,45,.35),aStroke=ha(hue,90,65,.9);
      segEl[i].style.cssText=`fill:${isDet||isTonic?active:base};stroke:${isDet||isTonic?aStroke:bStroke};stroke-width:${isDet||isTonic?1.5:.5};filter:${isDet?`drop-shadow(0 0 7px ${ha(hue,90,65,.7)})`:'none'}`;
      txtEl[i].style.fill=h(hue,isDet||isTonic?95:60,isDet||isTonic?80:50);
    } else {
      if(isTonic){
        segEl[i].style.cssText='fill:rgba(255,112,64,.2);stroke:rgba(255,112,64,.6);stroke-width:1;filter:none';
        txtEl[i].style.fill='#ff7040';
      } else if(isDet){
        segEl[i].style.cssText='fill:rgba(79,195,212,.15);stroke:rgba(79,195,212,.5);stroke-width:1;filter:none';
        txtEl[i].style.fill='#4fc3d4';
      } else {
        segEl[i].style.cssText='fill:transparent;stroke:rgba(255,255,255,.06);stroke-width:.5;filter:none';
        txtEl[i].style.fill='rgba(255,255,255,.25)';
      }
    }
  }
  // Inner labels
  if(tC!==-1){
    const m=diatMap(tC);
    for(let i=0;i<N;i++){
      const c=N2C[CIRCLE[i].name];
      if(m[c]!==undefined){
        innEl[i].textContent=m[c];
        innEl[i].style.fill=colorOn?h(HUE[(c-tC+12)%12],70,65):'rgba(255,255,255,.5)';
      } else { innEl[i].textContent=''; innEl[i].style.fill=''; }
    }
  } else { for(let i=0;i<N;i++) innEl[i].textContent=''; }
  // Connector
  if(tC!==-1&&dC!==-1&&dC!==tC){
    const ti=CIRCLE.findIndex(x=>N2C[x.name]===tC);
    const di=CIRCLE.findIndex(x=>N2C[x.name]===dC);
    if(ti!==-1&&di!==-1){
      const a1=OFF+ti*SL+SL/2,a2=OFF+di*SL+SL/2,r=(RO+RI)/2;
      const[x1,y1]=pXY(a1,r),[x2,y2]=pXY(a2,r);
      sa(conn,{x1,y1,x2,y2}); conn.className.baseVal='conn show';
      const hue=HUE[(dC-tC+12)%12];
      conn.style.stroke=colorOn?ha(hue,80,65,.5):'rgba(255,255,255,.2)';
    }
  } else conn.className.baseVal='conn';
  // Glow ring
  if(tC!==-1){
    gTonic.style.stroke=colorOn?h(HUE[0],80,60):'rgba(255,112,64,.5)';
    gTonic.className.baseVal='gring show';
  } else gTonic.className.baseVal='gring';
  // Note display colors
  const tEl=document.getElementById('tnote');
  const dEl=document.getElementById('dnote');
  tEl.style.color=tC!==-1?(colorOn?h(HUE[0],85,72):'#ff7040'):'rgba(255,255,255,.2)';
  dEl.style.color=dC!==-1&&tC!==-1?(colorOn?h(HUE[(dC-tC+12)%12],85,72):'#4fc3d4'):dC!==-1?'rgba(255,255,255,.6)':'rgba(255,255,255,.2)';
}

function showIntv(intv,dC,tC){
  const n=document.getElementById('iname'),b=document.getElementById('ibadge'),s=document.getElementById('isub');
  if(!intv||tC===-1){n.textContent='—';n.style.color='rgba(255,255,255,.15)';b.innerHTML='';s.textContent='';return;}
  const semi=(dC-tC+12)%12,hue=HUE[semi];
  const color=colorOn?h(hue,85,68):'#e8e4f0';
  n.textContent=intv.en; n.style.color=color;
  s.textContent=`${intv.s} semitone${intv.s!==1?'s':''} · ${ILBL[semi]}`;
  const ql={perfect:'Perfect',major:'Major',minor:'Minor',tritone:'Tritone ⚡'};
  b.innerHTML=`<span class="badge" style="color:${color};border-color:${color}">${ql[intv.q]||intv.q}</span>`;
}

// ── YIN ──────────────────────────────────────────────────────────
function yin(buf,sr,thr=0.12){
  const N2=Math.floor(buf.length/2);
  let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]**2; rms=Math.sqrt(rms/buf.length);
  if(rms<0.008) return{freq:-1,rms};
  const diff=new Float32Array(N2);
  for(let tau=1;tau<N2;tau++){let s=0;for(let j=0;j<N2;j++){const d=buf[j]-buf[j+tau];s+=d*d;}diff[tau]=s;}
  const cm=new Float32Array(N2);cm[0]=1;let sum=0;
  for(let tau=1;tau<N2;tau++){sum+=diff[tau];cm[tau]=sum>0?diff[tau]*tau/sum:1;}
  let tau=-1;
  for(let t=2;t<N2;t++){if(cm[t]<thr){while(t+1<N2&&cm[t+1]<cm[t])t++;tau=t;break;}}
  if(tau===-1) return{freq:-1,rms};
  let bt=tau;
  if(tau>0&&tau<N2-1){const s0=cm[tau-1],s1=cm[tau],s2=cm[tau+1];bt=tau+(s2-s0)/(2*(2*s1-s2-s0));}
  return{freq:sr/bt,rms};
}
function f2note(freq){
  if(freq<55||freq>1400) return null;
  const nn=12*(Math.log2(freq/440))+69,r=Math.round(nn),cents=Math.round((nn-r)*100);
  if(Math.abs(cents)>48) return null;
  return{note:CHROMA[((r%12)+12)%12],chroma:((r%12)+12)%12,cents,octave:Math.floor(r/12)-1};
}
function c2idx(c){for(let i=0;i<N;i++)if(N2C[CIRCLE[i].name]===c)return i;return -1;}

// ── State ─────────────────────────────────────────────────────────
let aCtx=null,analyser=null,stream=null,running=false,raf=null,abuf=null;
let tC=-1,dC=-1,stable=-1,stCnt=0;
const STABLE=5,hist=[];

// ── Loop ──────────────────────────────────────────────────────────
function loop(){
  if(!running) return;
  analyser.getFloatTimeDomainData(abuf);
  const{freq,rms}=yin(abuf,aCtx.sampleRate);
  const mf=document.getElementById('mfill');
  mf.style.width=Math.min(rms*450,100)+'%';
  if(freq>0){
    const info=f2note(freq);
    if(info){
      const{note,chroma,cents,octave}=info;
      if(chroma===stable)stCnt++;else{stable=chroma;stCnt=1;}
      if(stCnt>=STABLE){
        document.getElementById('dnote').textContent=note;
        document.getElementById('dfreq').textContent=`${freq.toFixed(0)} Hz · ${note}${octave}`;
        const cc=Math.abs(cents)<=10?'#4ade80':Math.abs(cents)<=20?'#fbbf24':'#f87171';
        document.getElementById('dcents').innerHTML=`<span style="color:${cc}">${cents>0?'+':''}${cents}¢ ${Math.abs(cents)<=10?'✓':Math.abs(cents)<=20?'≈':'✗'}</span>`;
        document.getElementById('btonic').disabled=false;
        document.getElementById('stext').textContent=`${note}${octave}`;
        if(chroma!==dC){
          dC=chroma;
          const idx=c2idx(chroma);
          const hue=tC!==-1?HUE[(chroma-tC+12)%12]:HUE[idx%12];
          burst(idx,hue);
          refreshAll(dC,tC);
          if(tC!==-1){
            const semi=(chroma-tC+12)%12,intv=INTVS[semi];
            showIntv(intv,dC,tC);
            cLbl.textContent=note; cLbl2.textContent=intv?.short||'';
            cLbl.style.fill=colorOn?h(HUE[semi],80,72):'rgba(255,255,255,.25)';
            if(chroma!==tC){
              hist.unshift({...intv,semi});
              if(hist.length>10) hist.pop();
              document.getElementById('hist').innerHTML=hist.map(hh=>{
                const color=colorOn?h(HUE[hh.semi],75,68):'rgba(255,255,255,.4)';
                return`<span class="hchip" style="color:${color};border-color:${color}25">${hh.short}</span>`;
              }).join('');
            }
          } else { cLbl.textContent=note; cLbl2.textContent=''; cLbl.style.fill=''; }
        }
      }
    }
  }
  raf=requestAnimationFrame(loop);
}

// ── Mic ───────────────────────────────────────────────────────────
document.getElementById('bmicf').addEventListener('click',async()=>{
  if(!running){
    try{
      stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
      aCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
      await aCtx.resume();
      const src=aCtx.createMediaStreamSource(stream);
      analyser=aCtx.createAnalyser(); analyser.fftSize=4096; analyser.smoothingTimeConstant=0.1;
      abuf=new Float32Array(analyser.fftSize); src.connect(analyser);
      running=true;
      document.getElementById('bmicf').textContent='⏹ Stop';
      document.getElementById('bmicf').style.background='linear-gradient(135deg,#7f1d1d,#dc2626)';
      document.getElementById('sdot').className='dot go';
      document.getElementById('stext').textContent='listening';
      loop();
    }catch(e){document.getElementById('stext').textContent='mic denied';}
  } else {
    running=false; if(raf)cancelAnimationFrame(raf);
    if(stream)stream.getTracks().forEach(t=>t.stop());
    if(aCtx)aCtx.close();
    document.getElementById('bmicf').textContent='🎙 Start';
    document.getElementById('bmicf').style.background='';
    document.getElementById('sdot').className='dot';
    document.getElementById('stext').textContent='tap mic';
    document.getElementById('mfill').style.width='0%';
    document.getElementById('btonic').disabled=true;
  }
});

// ── Set tonic ─────────────────────────────────────────────────────
document.getElementById('btonic').addEventListener('click',()=>{
  if(dC===-1) return;
  tC=dC;
  const note=document.getElementById('dnote').textContent;
  document.getElementById('tnote').textContent=note;
  document.getElementById('tfreq').textContent=document.getElementById('dfreq').textContent;
  refreshAll(dC,tC);
  cLbl.textContent=note; cLbl2.textContent='tonic';
  showIntv(null,dC,tC); hist.length=0; document.getElementById('hist').innerHTML='';
  const idx=c2idx(tC); if(idx!==-1){burst(idx,HUE[0],30);setTimeout(()=>burst(idx,HUE[0],20),150);}
});

// ── Click circle ─────────────────────────────────────────────────
svg.addEventListener('click',e=>{
  const i=parseInt(e.target.dataset.idx); if(isNaN(i)) return;
  tC=N2C[CIRCLE[i].name];
  document.getElementById('tnote').textContent=CIRCLE[i].name;
  document.getElementById('tfreq').textContent='manual';
  refreshAll(dC,tC);
  cLbl.textContent=CIRCLE[i].name; cLbl2.textContent='tonic';
  showIntv(null,dC,tC); hist.length=0; document.getElementById('hist').innerHTML='';
  burst(i,HUE[0],30); setTimeout(()=>burst(i,HUE[0],20),150);
});

// ── Theme toggle ─────────────────────────────────────────────────
document.getElementById('theme-row').addEventListener('click',()=>{
  glowOn=!glowOn; colorOn=glowOn;
  document.getElementById('ttk').className='toggle-track'+(colorOn?' on':'');
  refreshAll(dC,tC);
  if(tC!==-1&&dC!==-1){const semi=(dC-tC+12)%12;showIntv(INTVS[semi],dC,tC);}
  if(colorOn&&dC!==-1){const idx=c2idx(dC);if(idx!==-1){const hue=tC!==-1?HUE[(dC-tC+12)%12]:HUE[idx%12];burst(idx,hue,30);}}
});

// ── Service Worker ────────────────────────────────────────────────
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// Init
refreshAll(-1,-1);
</script>
