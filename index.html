<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- iOS PWA essential tags -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoF">
<meta name="theme-color" content="#080810">
<link rel="manifest" href="manifest.json">
<!-- Apple touch icon (shown on home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">
<title>Circle of Fifths</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:#080810; --surface:#0f0f1c; --surface2:#161628;
  --border:#252540; --border2:#1a1a30;
  --text:#ddd8f0; --muted:#5a5a80; --dim:#3a3a58;
  --gold:#d4a843; --gold-glow:rgba(212,168,67,0.25);
  --c-perfect:#4fc3d4; --c-major:#d4a843;
  --c-minor:#a06ed4; --c-tritone:#d45050;
  --c-tonic:#ff7040;
  --glow-tonic:rgba(255,112,64,0.3);
  --glow-det:rgba(79,195,212,0.3);
  /* iOS safe areas */
  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
  --sal: env(safe-area-inset-left);
  --sar: env(safe-area-inset-right);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Space Mono', monospace;
  overflow:hidden; /* prevent scroll bounce on iOS */
  overscroll-behavior:none;
}

/* Full-screen app layout */
.app {
  display:flex; flex-direction:column;
  width:100%; height:100%;
  padding-top: max(16px, var(--sat));
  padding-bottom: max(16px, var(--sab));
  padding-left: max(12px, var(--sal));
  padding-right: max(12px, var(--sar));
  gap:10px;
  overflow:hidden;
}

/* ── Header ── */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.hdr h1 {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; color:var(--gold);
  letter-spacing:.1em;
  text-shadow:0 0 30px var(--gold-glow);
}
.status-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:5px 10px;
  font-size:.55rem; letter-spacing:.08em; color:var(--muted);
}
.dot { width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0; }
.dot.on  { background:#4ade80; box-shadow:0 0 6px rgba(74,222,128,.7); animation:blink 1.2s infinite; }
.dot.go  { background:var(--c-perfect); box-shadow:0 0 6px var(--glow-det); animation:blink .7s infinite; }
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}

/* ── Circle ── */
.circle-wrap {
  flex-shrink:0;
  display:flex; justify-content:center;
}
#cof {
  /* Size = min of viewport width or ~55% of screen height */
  width:  min(calc(100vw - 24px), 50vh);
  height: min(calc(100vw - 24px), 50vh);
  filter:drop-shadow(0 0 30px rgba(212,168,67,.06));
}

/* ── Bottom section: cards ── */
.bottom {
  flex:1; display:flex; flex-direction:column; gap:8px;
  overflow:hidden;
  min-height:0;
}

/* Two-column row */
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0; }

/* Cards */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:10px 12px;
}
.clabel { font-size:.5rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }

/* Note display */
.big-note {
  font-family:'Cormorant Garamond',serif;
  font-size:2.6rem; font-weight:400; line-height:1;
  min-height:40px; display:flex; align-items:center;
}
.big-note.tc { color:var(--c-tonic);   text-shadow:0 0 16px var(--glow-tonic); }
.big-note.dc { color:var(--c-perfect); text-shadow:0 0 16px var(--glow-det); }
.note-sub { font-size:.52rem; color:var(--muted); margin-top:2px; }

/* Interval */
.intv-row { display:flex; align-items:baseline; justify-content:space-between; }
.intv-name {
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem; font-weight:600; line-height:1.1;
  transition:color .3s;
}
.intv-name.cp { color:var(--c-perfect); }
.intv-name.cm { color:var(--c-major); }
.intv-name.cn { color:var(--c-minor); }
.intv-name.ct { color:var(--c-tritone); }
.intv-name.cx { color:var(--c-tonic); }

.badge {
  padding:2px 8px; border-radius:20px; font-size:.5rem;
  letter-spacing:.1em; text-transform:uppercase; border:1px solid currentColor;
}
.bp { color:var(--c-perfect); background:rgba(79,195,212,.1); }
.bm { color:var(--c-major);   background:rgba(212,168,67,.1); }
.bn { color:var(--c-minor);   background:rgba(160,110,212,.1); }
.bt { color:var(--c-tritone); background:rgba(212,80,80,.1); }
.bx { color:var(--c-tonic);   background:rgba(255,112,64,.1); }

/* Meter */
.meter { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:6px; }
.mfill { height:100%; width:0%; background:linear-gradient(90deg,var(--c-perfect),var(--gold)); border-radius:2px; transition:width .08s; }

/* Cents */
.cents { font-size:.52rem; margin-top:3px; }

/* Buttons row */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0; }
.btn {
  padding:12px 8px; border-radius:10px; border:none;
  font-family:'Space Mono',monospace; font-size:.62rem;
  letter-spacing:.06em; cursor:pointer; transition:all .15s;
  text-transform:uppercase; -webkit-user-select:none;
  /* iOS touch feedback */
  active:opacity:.7;
}
.btn:active { transform:scale(.96); }
.btn-start {
  background:linear-gradient(135deg,#c9943a,#e8bc5a);
  color:#08080e; font-weight:700;
  box-shadow:0 2px 12px var(--gold-glow);
}
.btn-tonic {
  background:rgba(255,112,64,.12); color:var(--c-tonic);
  border:1px solid rgba(255,112,64,.35);
}
.btn-tonic:disabled { opacity:.3; }

/* History */
.hist { display:flex; flex-wrap:wrap; gap:3px; }
.hchip {
  padding:2px 6px; border-radius:4px; font-size:.52rem;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--muted); animation:pop .15s ease;
}
.hchip.cp { border-color:rgba(79,195,212,.3);  color:var(--c-perfect); }
.hchip.cm { border-color:rgba(212,168,67,.3);  color:var(--c-major); }
.hchip.cn { border-color:rgba(160,110,212,.3); color:var(--c-minor); }
.hchip.ct { border-color:rgba(212,80,80,.3);   color:var(--c-tritone); }
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

/* ── SVG styles ── */
.seg { fill:transparent; stroke:var(--border); stroke-width:.6; }
.seg.s-tonic   { fill:rgba(255,112,64,.18);   stroke:rgba(255,112,64,.5);   stroke-width:1; }
.seg.s-perfect { fill:rgba(79,195,212,.13);   stroke:rgba(79,195,212,.45);  stroke-width:1; }
.seg.s-major   { fill:rgba(212,168,67,.13);   stroke:rgba(212,168,67,.45);  stroke-width:1; }
.seg.s-minor   { fill:rgba(160,110,212,.12);  stroke:rgba(160,110,212,.4);  stroke-width:1; }
.seg.s-tritone { fill:rgba(212,80,80,.15);    stroke:rgba(212,80,80,.5);    stroke-width:1; }

.nt { font-family:'Cormorant Garamond',serif; font-size:13px; text-anchor:middle; dominant-baseline:central; fill:#6060a0; user-select:none; transition:fill .2s; }
.nt.tonic-t    { fill:var(--c-tonic);   font-weight:600; }
.nt.detected-t { fill:var(--c-perfect); font-weight:600; }
.at { font-family:'Space Mono',monospace; font-size:7px; text-anchor:middle; dominant-baseline:central; fill:#2e2e50; pointer-events:none; }
.ct { font-family:'Space Mono',monospace; font-size:6.5px; text-anchor:middle; dominant-baseline:central; fill:#2a2a48; pointer-events:none; transition:fill .3s; }
.ct.on { fill:var(--c-perfect); }
.spoke { stroke:var(--border); stroke-width:.5; }
.conn { stroke:rgba(212,168,67,.4); stroke-width:1.5; stroke-dasharray:4 3; opacity:0; pointer-events:none; transition:opacity .3s; }
.conn.show { opacity:1; }
.gring { fill:none; stroke-width:2; opacity:0; pointer-events:none; }
.gring.show { opacity:.45; animation:grp 1.1s infinite; }
.gring.tr { stroke:var(--c-tonic); }
.gring.dr { stroke:var(--c-perfect); }
.gring.pr { stroke:var(--c-perfect); }
.gring.mr { stroke:var(--c-major); }
.gring.nr { stroke:var(--c-minor); }
.gring.xr { stroke:var(--c-tritone); }
@keyframes grp{0%,100%{stroke-opacity:.45}50%{stroke-opacity:.1}}
.clbl  { font-family:'Cormorant Garamond',serif; font-size:11px; text-anchor:middle; dominant-baseline:central; fill:var(--muted); pointer-events:none; }
.clbl2 { font-family:'Space Mono',monospace; font-size:7px; text-anchor:middle; dominant-baseline:central; fill:var(--dim); pointer-events:none; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <h1>Circle of Fifths</h1>
    <div class="status-pill">
      <div class="dot" id="sdot"></div>
      <span id="stext">tap mic</span>
    </div>
  </div>

  <!-- Circle -->
  <div class="circle-wrap">
    <svg id="cof" viewBox="0 0 320 320"></svg>
  </div>

  <!-- Bottom -->
  <div class="bottom">

    <!-- Tonic + Detected -->
    <div class="row2">
      <div class="card">
        <div class="clabel">Tonic</div>
        <div class="big-note tc" id="tnote">—</div>
        <div class="note-sub" id="tfreq"></div>
      </div>
      <div class="card">
        <div class="clabel">Detected</div>
        <div class="big-note dc" id="dnote">—</div>
        <div class="note-sub" id="dfreq"></div>
        <div class="cents" id="dcents"></div>
      </div>
    </div>

    <!-- Interval + History -->
    <div class="row2">
      <div class="card">
        <div class="clabel">Interval</div>
        <div class="intv-row">
          <div class="intv-name" id="iname">—</div>
          <div id="ibadge"></div>
        </div>
        <div class="note-sub" id="isub"></div>
        <div class="meter"><div class="mfill" id="mfill"></div></div>
      </div>
      <div class="card">
        <div class="clabel">History</div>
        <div class="hist" id="hist"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-start" id="bmicf">🎙 Start</button>
      <button class="btn btn-tonic" id="btonic" disabled>Set Tonic</button>
    </div>

  </div>
</div><!-- app -->

<script>
// ── Music Data ──────────────────────────────────────────────────
const CIRCLE=[
  {name:'C',alt:null},{name:'G',alt:null},{name:'D',alt:null},
  {name:'A',alt:null},{name:'E',alt:null},{name:'B',alt:'C♭'},
  {name:'F♯',alt:'G♭'},{name:'D♭',alt:'C♯'},{name:'A♭',alt:'G♯'},
  {name:'E♭',alt:'D♯'},{name:'B♭',alt:'A♯'},{name:'F',alt:null},
];
const CHROMA=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const N2C={C:0,G:7,D:2,A:9,E:4,B:11,'F♯':6,'D♭':1,'A♭':8,'E♭':3,'B♭':10,F:5};
const INTERVALS=[
  {en:'Unison',short:'P1',s:0,q:'perfect'},
  {en:'m2',    short:'m2',s:1,q:'minor'},
  {en:'M2',    short:'M2',s:2,q:'major'},
  {en:'m3',    short:'m3',s:3,q:'minor'},
  {en:'M3',    short:'M3',s:4,q:'major'},
  {en:'P4',    short:'P4',s:5,q:'perfect'},
  {en:'♭5/TT', short:'TT',s:6,q:'tritone'},
  {en:'P5',    short:'P5',s:7,q:'perfect'},
  {en:'m6',    short:'m6',s:8,q:'minor'},
  {en:'M6',    short:'M6',s:9,q:'major'},
  {en:'m7',    short:'m7',s:10,q:'minor'},
  {en:'M7',    short:'M7',s:11,q:'major'},
];
const DIAT_ST=[0,2,4,5,7,9,11];
const DIAT_Q=['maj','min','min','maj','maj','min','dim'];
const DIAT_R=['I','ii','iii','IV','V','vi','vii°'];

function diatonicMap(tChroma){
  const m={};
  DIAT_ST.forEach((s,i)=>{ m[(tChroma+s)%12]=DIAT_R[i]; });
  return m;
}

// ── SVG Build ───────────────────────────────────────────────────
const svg=document.getElementById('cof');
const CX=160,CY=160,RO=154,RI=90,RC=42,N=12;
const SL=(2*Math.PI)/N, OFF=-Math.PI/2-SL/2;

function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function sa(el,a){for(const[k,v] of Object.entries(a))el.setAttribute(k,v);return el;}
function ap(el,p){(p||svg).appendChild(el);return el;}
function pXY(a,r){return[CX+r*Math.cos(a),CY+r*Math.sin(a)];}
function arc(oR,iR,a1,a2){
  const[x1,y1]=pXY(a1,oR),[x2,y2]=pXY(a2,oR);
  const[x3,y3]=pXY(a2,iR),[x4,y4]=pXY(a1,iR);
  return`M${x1} ${y1}A${oR} ${oR} 0 0 1 ${x2} ${y2}L${x3} ${y3}A${iR} ${iR} 0 0 0 ${x4} ${y4}Z`;
}

ap(sa(ns('circle'),{cx:CX,cy:CY,r:RO,fill:'#13132a',stroke:'#252545','stroke-width':'1'}));
ap(sa(ns('circle'),{cx:CX,cy:CY,r:RI,fill:'#0e0e1e',stroke:'#1e1e38','stroke-width':'1'}));
ap(sa(ns('circle'),{cx:CX,cy:CY,r:RC,fill:'#0b0b18',stroke:'#1e1e38','stroke-width':'1'}));

const gTonic=ap(sa(ns('circle'),{cx:CX,cy:CY,r:(RO+RI)/2,class:'gring tr'}));
const gDet  =ap(sa(ns('circle'),{cx:CX,cy:CY,r:(RO+RI)/2,class:'gring dr'}));
const conn  =ap(sa(ns('line'),  {class:'conn',x1:CX,y1:CY,x2:CX,y2:CY}));

const segEl={},txtEl={},innEl={};

for(let i=0;i<N;i++){
  const nd=CIRCLE[i];
  const a1=OFF+i*SL, a2=a1+SL, mid=a1+SL/2;
  const[spx,spy]=pXY(a1,RO),[six,siy]=pXY(a1,RI);
  ap(sa(ns('line'),{x1:spx,y1:spy,x2:six,y2:siy,class:'spoke'}));
  const seg=ap(sa(ns('path'),{d:arc(RO,RI,a1,a2),class:'seg','data-idx':i}));
  segEl[i]=seg;
  const[tx,ty]=pXY(mid,(RO+RI)/2);
  const t=ap(sa(ns('text'),{x:tx,y:ty,class:'nt','data-idx':i}));
  t.textContent=nd.name; txtEl[i]=t;
  if(nd.alt){ const[ax,ay]=pXY(mid,(RO+RI)/2-14); const a=ap(sa(ns('text'),{x:ax,y:ay,class:'at'})); a.textContent=nd.alt; }
  const[ix,iy]=pXY(mid,(RI+RC)/2);
  const it=ap(sa(ns('text'),{x:ix,y:iy,class:'ct'}));
  it.textContent=''; innEl[i]=it;
}

const cLbl =ap(sa(ns('text'),{x:CX,y:CY-7, class:'clbl'}));
const cLbl2=ap(sa(ns('text'),{x:CX,y:CY+8, class:'clbl2'}));
cLbl.textContent=''; cLbl2.textContent='';

// ── YIN ─────────────────────────────────────────────────────────
function yin(buf,sr,thr=0.12){
  const N2=Math.floor(buf.length/2);
  let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]**2;
  rms=Math.sqrt(rms/buf.length);
  if(rms<0.008) return{freq:-1,rms};
  const diff=new Float32Array(N2);
  for(let tau=1;tau<N2;tau++){
    let s=0; for(let j=0;j<N2;j++){const d=buf[j]-buf[j+tau];s+=d*d;}
    diff[tau]=s;
  }
  const cmnd=new Float32Array(N2); cmnd[0]=1; let sum=0;
  for(let tau=1;tau<N2;tau++){sum+=diff[tau];cmnd[tau]=sum>0?diff[tau]*tau/sum:1;}
  let tau=-1;
  for(let t=2;t<N2;t++){
    if(cmnd[t]<thr){while(t+1<N2&&cmnd[t+1]<cmnd[t])t++;tau=t;break;}
  }
  if(tau===-1) return{freq:-1,rms};
  let bt=tau;
  if(tau>0&&tau<N2-1){const s0=cmnd[tau-1],s1=cmnd[tau],s2=cmnd[tau+1];bt=tau+(s2-s0)/(2*(2*s1-s2-s0));}
  return{freq:sr/bt,rms};
}

function f2note(freq){
  if(freq<55||freq>1400) return null;
  const n=12*(Math.log2(freq/440))+69;
  const r=Math.round(n);
  const cents=Math.round((n-r)*100);
  if(Math.abs(cents)>48) return null;
  return{note:CHROMA[((r%12)+12)%12],chroma:((r%12)+12)%12,cents,octave:Math.floor(r/12)-1};
}

function c2idx(chroma){
  for(let i=0;i<N;i++) if(N2C[CIRCLE[i].name]===chroma) return i;
  return -1;
}

// ── State ────────────────────────────────────────────────────────
let ctx=null,analyser=null,stream=null,running=false,rafId=null,buf=null;
let tChroma=-1,tIdx=-1,dChroma=-1,stable=-1,stCnt=0;
const STABLE=5, hist=[];

// ── Visual ───────────────────────────────────────────────────────
const qCls={perfect:'cp',major:'cm',minor:'cn',tritone:'ct'};
const sCls={perfect:'s-perfect',major:'s-major',minor:'s-minor',tritone:'s-tritone'};
const gCls={perfect:'pr',major:'mr',minor:'nr',tritone:'xr'};
const bCls={perfect:'bp',major:'bm',minor:'bn',tritone:'bt'};
const iCls={perfect:'cp',major:'cm',minor:'cn',tritone:'ct'};

function refreshSegs(dc){
  for(let i=0;i<N;i++){segEl[i].className.baseVal='seg';txtEl[i].className.baseVal='nt';}
  if(tIdx!==-1){segEl[tIdx].className.baseVal='seg s-tonic';txtEl[tIdx].className.baseVal='nt tonic-t';}
  if(dc!==-1&&dc!==tChroma){
    const idx=c2idx(dc); if(idx===-1) return;
    const semi=(dc-tChroma+12)%12;
    const q=tChroma===-1?'perfect':INTERVALS[semi]?.q||'perfect';
    segEl[idx].className.baseVal=`seg ${sCls[q]}`;
    txtEl[idx].className.baseVal='nt detected-t';
    gDet.className.baseVal=`gring show ${gCls[q]}`;
    if(tIdx!==-1){
      const a1=OFF+tIdx*SL+SL/2, a2=OFF+idx*SL+SL/2;
      const r=(RO+RI)/2;
      const[x1,y1]=pXY(a1,r),[x2,y2]=pXY(a2,r);
      sa(conn,{x1,y1,x2,y2}); conn.className.baseVal='conn show';
    }
  } else { gDet.className.baseVal='gring dr'; conn.className.baseVal='conn'; }
}

function refreshInner(tc){
  if(tc===-1){for(let i=0;i<N;i++){innEl[i].textContent='';innEl[i].className.baseVal='ct';}return;}
  const m=diatonicMap(tc);
  for(let i=0;i<N;i++){
    const c=N2C[CIRCLE[i].name];
    if(m[c]!==undefined){innEl[i].textContent=m[c];innEl[i].className.baseVal='ct on';}
    else{innEl[i].textContent='';innEl[i].className.baseVal='ct';}
  }
}

function showInterval(intv,dNote){
  const n=document.getElementById('iname');
  const b=document.getElementById('ibadge');
  const s=document.getElementById('isub');
  if(!intv||tChroma===-1){n.textContent='—';n.className='intv-name';b.innerHTML='';s.textContent='';return;}
  if(dNote===document.getElementById('tnote').textContent){
    n.textContent='Tonic';n.className='intv-name cx';
    b.innerHTML='<span class="badge bx">Root</span>';s.textContent='P1 · 0 st';return;
  }
  n.textContent=intv.en; n.className=`intv-name ${iCls[intv.q]||''}`;
  b.innerHTML=`<span class="badge ${bCls[intv.q]||''}">
    ${{perfect:'Perfect',major:'Major',minor:'Minor',tritone:'Tritone'}[intv.q]}</span>`;
  s.textContent=`${intv.s} semitone${intv.s!==1?'s':''}`;
}

function pushHist(intv){
  if(!intv) return;
  hist.unshift(intv);
  if(hist.length>10) hist.pop();
  document.getElementById('hist').innerHTML=
    hist.map(h=>`<span class="hchip ${qCls[h.q]||''}">${h.short}</span>`).join('');
}

// ── Loop ─────────────────────────────────────────────────────────
function loop(){
  if(!running) return;
  analyser.getFloatTimeDomainData(buf);
  const{freq,rms}=yin(buf,ctx.sampleRate);
  document.getElementById('mfill').style.width=Math.min(rms*450,100)+'%';

  if(freq>0){
    const info=f2note(freq);
    if(info){
      const{note,chroma,cents,octave}=info;
      if(chroma===stable) stCnt++; else{stable=chroma;stCnt=1;}
      if(stCnt>=STABLE){
        document.getElementById('dnote').textContent=note;
        document.getElementById('dfreq').textContent=`${freq.toFixed(0)} Hz · ${note}${octave}`;
        const cc=Math.abs(cents)<=10?'#4fc3d4':Math.abs(cents)<=20?'#d4a843':'#d46060';
        const cs=cents>0?'+':'';
        document.getElementById('dcents').innerHTML=
          `<span style="color:${cc}">${cs}${cents}¢ ${Math.abs(cents)<=10?'✓':Math.abs(cents)<=20?'≈':'✗'}</span>`;
        document.getElementById('btonic').disabled=false;
        document.getElementById('stext').textContent=`${note}${octave}`;

        if(chroma!==dChroma){
          dChroma=chroma;
          refreshSegs(chroma);
          if(tChroma!==-1){
            const semi=(chroma-tChroma+12)%12;
            const intv=INTERVALS[semi];
            showInterval(intv,note);
            cLbl.textContent=note;
            cLbl2.textContent=intv?.short||'';
            if(chroma!==tChroma) pushHist(intv);
          } else { cLbl.textContent=note; cLbl2.textContent=''; }
        }
      }
    }
  }
  rafId=requestAnimationFrame(loop);
}

// ── Mic ──────────────────────────────────────────────────────────
document.getElementById('bmicf').addEventListener('click',async()=>{
  // iOS requires AudioContext resume on user gesture
  if(!running){
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false
      });
      ctx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
      await ctx.resume(); // critical for iOS
      const src=ctx.createMediaStreamSource(stream);
      analyser=ctx.createAnalyser();
      analyser.fftSize=4096;
      analyser.smoothingTimeConstant=0.1;
      buf=new Float32Array(analyser.fftSize);
      src.connect(analyser);
      running=true;
      document.getElementById('bmicf').textContent='⏹ Stop';
      document.getElementById('bmicf').style.background='linear-gradient(135deg,#8b2020,#c0392b)';
      document.getElementById('sdot').className='dot go';
      document.getElementById('stext').textContent='listening';
      loop();
    }catch(e){
      document.getElementById('stext').textContent='mic denied';
    }
  } else {
    running=false;
    if(rafId) cancelAnimationFrame(rafId);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    if(ctx) ctx.close();
    document.getElementById('bmicf').textContent='🎙 Start';
    document.getElementById('bmicf').style.background='';
    document.getElementById('sdot').className='dot';
    document.getElementById('stext').textContent='tap mic';
    document.getElementById('mfill').style.width='0%';
    document.getElementById('btonic').disabled=true;
  }
});

// ── Set Tonic ────────────────────────────────────────────────────
document.getElementById('btonic').addEventListener('click',()=>{
  if(dChroma===-1) return;
  tChroma=dChroma; tIdx=c2idx(tChroma);
  document.getElementById('tnote').textContent=document.getElementById('dnote').textContent;
  document.getElementById('tfreq').textContent=document.getElementById('dfreq').textContent;
  gTonic.className.baseVal='gring show tr';
  refreshInner(tChroma); refreshSegs(dChroma);
  cLbl.textContent=document.getElementById('dnote').textContent;
  cLbl2.textContent='tonic';
  showInterval(null,''); hist.length=0;
  document.getElementById('hist').innerHTML='';
});

// ── Click circle ─────────────────────────────────────────────────
svg.addEventListener('click',e=>{
  const i=parseInt(e.target.dataset.idx);
  if(isNaN(i)) return;
  tChroma=N2C[CIRCLE[i].name]; tIdx=i;
  document.getElementById('tnote').textContent=CIRCLE[i].name;
  document.getElementById('tfreq').textContent='manual';
  gTonic.className.baseVal='gring show tr';
  refreshInner(tChroma); refreshSegs(dChroma);
  cLbl.textContent=CIRCLE[i].name; cLbl2.textContent='tonic';
  showInterval(null,''); hist.length=0;
  document.getElementById('hist').innerHTML='';
});

// ── Service Worker ────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
